name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci-pr.yml'
      - 'apps/frontend/**'
      - 'apps/backend/**'
      - 'infra/database/**'
      - 'infra/aws-deployment/**'
      - 'package.json'
      - 'package-lock.json'
      - 'infra/compose/docker-compose.yml'
      - 'infra/compose/docker-compose.dev.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: npm --prefix apps/frontend run test

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend tests
        run: npm --prefix apps/backend run test

  integration:
    name: Integration Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate EC2 compose config
        run: docker compose -f infra/aws-deployment/docker-compose.ec2.yml config >/dev/null
