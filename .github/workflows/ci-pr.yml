name: PR Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/ci-pr.yml'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'aws-deployment/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Frontend tests
        run: npm --prefix frontend run test

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backend build
        run: npm --prefix backend run build

      - name: Backend tests
        run: npm --prefix backend run test
