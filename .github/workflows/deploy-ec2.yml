name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      skip_checks:
        description: 'Skip CI checks and deploy directly (emergency only)'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: true

env:
  DEPLOY_DIR: /home/ubuntu/SysLab
  COMPOSE_FILE: aws-deployment/docker-compose.ec2.yml

jobs:
  quality-checks:
    name: Quality Checks
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_checks == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend tests
        run: npm run test:frontend

      - name: Backend tests
        run: npm run test:backend:ci

      - name: Validate compose config
        run: docker compose -f aws-deployment/docker-compose.ec2.yml config >/dev/null

  deploy:
    name: Deploy to EC2
    needs: quality-checks
    if: ${{ always() && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
          APP_URL: ${{ secrets.APP_URL }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          required=(EC2_HOST EC2_USER EC2_SSH_PRIVATE_KEY EC2_SSH_KNOWN_HOSTS APP_URL PUBLIC_HOST JWT_SECRET JWT_REFRESH_SECRET)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync code to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude 'coverage' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "$EC2_USER@$EC2_HOST:$DEPLOY_DIR/"

      - name: Deploy services
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$EC2_USER@$EC2_HOST" \
            "cd '$DEPLOY_DIR' && PUBLIC_HOST='$PUBLIC_HOST' JWT_SECRET='$JWT_SECRET' JWT_REFRESH_SECRET='$JWT_REFRESH_SECRET' bash ./aws-deployment/deploy-ec2-remote.sh"

      - name: Smoke test
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail
          for i in {1..15}; do
            if curl -fsS "$APP_URL/health" >/dev/null && curl -fsS "$APP_URL/api/v1" >/dev/null; then
              echo "Deployment is healthy"
              exit 0
            fi
            echo "Health check attempt $i failed. Retrying in 10s..."
            sleep 10
          done
          echo "Deployment health checks failed" >&2
          exit 1
