name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-ec2.yml'
      - 'aws-deployment/**'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: true

env:
  DEPLOY_DIR: /home/ubuntu/SysLab
  COMPOSE_FILE: aws-deployment/docker-compose.ec2.yml

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose -f aws-deployment/docker-compose.ec2.yml config >/dev/null

      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
          APP_URL: ${{ secrets.APP_URL }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          required=(EC2_HOST EC2_USER EC2_SSH_PRIVATE_KEY EC2_SSH_KNOWN_HOSTS APP_URL PUBLIC_HOST JWT_SECRET JWT_REFRESH_SECRET)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -o ConnectTimeout=15 \
            "$EC2_USER@$EC2_HOST" "echo 'SSH connectivity OK'"

      - name: Sync code to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude 'coverage' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "$EC2_USER@$EC2_HOST:$DEPLOY_DIR/"

      - name: Deploy services
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            if ssh -i ~/.ssh/id_ed25519 \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=20 \
              "$EC2_USER@$EC2_HOST" \
              "cd '$DEPLOY_DIR' && PUBLIC_HOST='$PUBLIC_HOST' JWT_SECRET='$JWT_SECRET' JWT_REFRESH_SECRET='$JWT_REFRESH_SECRET' bash ./aws-deployment/deploy-ec2-remote.sh"; then
              echo "Deploy succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq 2 ]; then
              echo "Deploy failed after 2 attempts" >&2
              exit 1
            fi

            echo "Deploy attempt $attempt failed. Retrying in 15s..."
            sleep 15
          done

      - name: Smoke test
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail
          for i in {1..15}; do
            if curl -fsS --max-time 10 "$APP_URL/health" >/dev/null \
              && curl -fsS --max-time 10 "$APP_URL/api/v1" >/dev/null \
              && curl -fsS --max-time 10 "$APP_URL/" | grep -qi "<html"; then
              echo "Deployment is healthy"
              exit 0
            fi
            echo "Health check attempt $i failed. Retrying in 10s..."
            sleep 10
          done
          echo "Deployment health checks failed" >&2
          exit 1

      - name: Collect remote diagnostics on failure
        if: ${{ failure() }}
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set +e
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$EC2_USER@$EC2_HOST" \
            "cd '$DEPLOY_DIR/aws-deployment' && docker compose -f docker-compose.ec2.yml ps && docker compose -f docker-compose.ec2.yml logs --tail=120 backend frontend gateway"
