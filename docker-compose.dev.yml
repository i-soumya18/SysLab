# Development Docker Compose Configuration
# Enable hot reload for frontend and backend development
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    # Use production image but override command for dev mode
    command: npm run dev -- --host 0.0.0.0
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/src/index.css:/app/src/index.css
      # Prevent mounting node_modules - use container's
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api/v1
      - VITE_WS_URL=ws://localhost:8080
    ports:
      - "5173:5173"  # Vite dev server with HMR
    stdin_open: true
    tty: true

  backend:
    # Use production image but override command for dev mode
    command: npm run dev
    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json
      # Prevent mounting node_modules
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

  backend-replica:
    # Use production image but override command for dev mode
    command: npm run dev
    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json
      # Prevent mounting node_modules
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

  # Update gateway to proxy to frontend dev server
  gateway:
    volumes:
      - ./nginx/gateway.dev.conf:/etc/nginx/conf.d/default.conf:ro
