# Development Docker Compose Configuration
# Run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    # Internal Docker network communication only

  redis:
    # Internal Docker network communication only

  frontend:
    # Use development Dockerfile
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      # Source code hot reload
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:8080/api/v1
      VITE_WS_URL: ws://localhost:8080
    stdin_open: true
    tty: true

  backend:
    # Use development Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    volumes:
      # Source code hot reload
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json
    environment:
      NODE_ENV: development
      DEBUG: "express:*"
    stdin_open: true
    tty: true

  backend-replica:
    # Use development Dockerfile
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run dev
    volumes:
      # Source code hot reload
      - ./backend/src:/app/src:delegated
      - ./backend/tsconfig.json:/app/tsconfig.json
    environment:
      NODE_ENV: development
      DEBUG: "express:*"
    stdin_open: true
    tty: true

  # Override gateway to proxy to Vite dev server with proper HMR
  gateway:
    volumes:
      - ./nginx/gateway.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
