services:
  postgres:
    image: postgres:15-alpine
    container_name: syslab-postgres
    environment:
      POSTGRES_DB: system_design_simulator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: syslab-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ../..
      dockerfile: infra/aws-deployment/Dockerfile.backend.ec2
    container_name: syslab-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: system_design_simulator
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://${PUBLIC_HOST}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-sharing}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-before-sharing}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/aws-deployment/Dockerfile.frontend.ec2
      args:
        VITE_API_URL: http://${PUBLIC_HOST}/api/v1
        VITE_WS_URL: http://${PUBLIC_HOST}
    container_name: syslab-frontend
    depends_on:
      - backend
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: syslab-gateway
    depends_on:
      - backend
      - frontend
    volumes:
      - ./gateway.ec2.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
