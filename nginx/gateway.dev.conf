# Development Nginx Gateway Configuration
# Optimized for hot reload and development experience

upstream sds_backend {
  ip_hash;
  server backend:3000;
  server backend-replica:3000;
}

server {
  listen 80;
  server_name _;

  # Disable all caching in development
  add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
  add_header Pragma "no-cache";

  # Health check
  location /health {
    access_log off;
    proxy_pass http://sds_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API endpoints to backend
  location /api/ {
    proxy_pass http://sds_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    
    # Development no-cache
    proxy_no_cache 1;
    proxy_cache_bypass 1;
  }

  # WebSocket for Socket.IO
  location /socket.io/ {
    proxy_pass http://sds_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    
    # Socket.IO specific
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Vite HMR WebSocket
  location /vite-hmr {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # @vite client endpoint (HMR in Vite)
  location /@vite {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_buffering off;
  }

  # Frontend - everything else
  location / {
    proxy_pass http://frontend:5173;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Development optimizations
    proxy_no_cache 1;
    proxy_cache_bypass 1;
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # Access logs
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log debug;
}
